name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build all modules
        run: mvn -B clean test
      - name: Run Static DU platform trigger
        run: mvn -q -pl static-du-platform exec:java -Dexec.mainClass=com.testable.training.platform.StaticDuTrigger
      - name: Verify static_du.json
        run: mvn -q -pl static-du-platform exec:java -Dexec.mainClass=com.testable.training.platform.StaticDuJsonVerifierCli
