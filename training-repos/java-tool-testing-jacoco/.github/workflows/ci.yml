name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build all modules
        run: mvn -B clean test
      - name: Run JaCoCo platform trigger
        run: mvn -q -pl jacoco-platform exec:java -Dexec.mainClass=com.testable.training.platform.JacocoTrigger
      - name: Verify jacoco.json
        run: mvn -q -pl jacoco-platform exec:java -Dexec.mainClass=com.testable.training.platform.JacocoJsonVerifierCli
