name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build all modules
        run: mvn -B clean test
      - name: Run Git platform trigger
        run: mvn -q -pl git-platform exec:java -Dexec.mainClass=com.testable.training.platform.GitTrigger
      - name: Verify git.json
        run: mvn -q -pl git-platform exec:java -Dexec.mainClass=com.testable.training.platform.GitJsonVerifierCli
